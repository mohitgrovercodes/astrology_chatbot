# config\config.yaml
# Astrology AI Chatbot - Configuration
# ============================================
# LLM Configuration
# ============================================
llm:
  default_provider: openai
  default_model: "gpt-4o-mini"
  fast_model: "gpt-4o-mini"
  
  temperature: 0.3
  max_tokens: 2048
  
  providers:
    openai:
      models:
        - gpt-4o-mini
        - gpt-4o
    ollama:
      models:
        - qwen2.5:7b
        - qwen2.5:1.5b
        - phi4

# ============================================
# Embeddings Configuration (OpenAI - for embeddings only)
# ============================================
embeddings:
  provider: openai
  model: text-embedding-3-large
  dimensions: 3072

# ============================================
# RAG Configuration
# ============================================
rag:
  chunk_size: 1000
  chunk_overlap: 200
  # top_k moved to config/rag_config.py for centralized control
  # Default: 10 (was 5)
  # Validation rules: 15, Interpretations: 10
  use_python_config: true
  score_threshold: 0.7
  collection_name: astrology_knowledge

# ============================================
# Safety Configuration
# ============================================
safety:
  blocked_topics:
    - death_prediction
    - death_timing
    - medical_diagnosis
    - medical_treatment
    - gambling_advice
    - lottery_prediction
    - legal_advice
  
  disclaimer_topics:
    health:
      message: "Please consult a qualified medical professional for health concerns."
    finance:
      message: "Please consult a qualified financial advisor for investment decisions."
    relationships:
      message: "Astrology offers insights but personal decisions should consider many factors."

# ============================================
# Astrology Configuration
# ============================================
astrology:
  systems:
    - vedic
    - western
  default_system: vedic
  ayanamsa: lahiri

# ============================================
# API Configuration
# ============================================
api:
  title: "Astrology AI Chatbot API"
  version: "1.0.0"
  description: "Expert-level Astrology Chatbot supporting Vedic and Western Astrology"
  rate_limit: 60
  timeout: 30

# ============================================
# Logging Configuration
# ============================================
logging:
  level: INFO
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file_logging: false
  log_file: "./logs/app.log"