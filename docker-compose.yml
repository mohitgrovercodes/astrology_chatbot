# docker-compose.yml
# NakshatraAI API - Docker Compose Configuration
# ================================================

version: '3.8'

services:
  api:
    build: .
    container_name: nakshatraai-api
    ports:
      - "8000:8000"
    environment:
      # в”Ђв”Ђ Server в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - DEBUG=false
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FILE=${LOG_FILE:-}

      # в”Ђв”Ђ Security в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - VALID_API_KEYS=${VALID_API_KEYS}
      - INTERNAL_SERVICE_SECRET=${INTERNAL_SERVICE_SECRET:-change-me}

      # в”Ђв”Ђ CORS / Rate limiting в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-["*"]}
      - RATE_LIMIT_PER_MINUTE=${RATE_LIMIT_PER_MINUTE:-10}
      - RATE_LIMIT_PER_HOUR=${RATE_LIMIT_PER_HOUR:-100}

      # в”Ђв”Ђ LLM Provider в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o-mini}
      - FAST_LLM_PROVIDER=${FAST_LLM_PROVIDER:-openai}
      - FAST_LLM_MODEL=${FAST_LLM_MODEL:-gpt-4o-mini}

      # в”Ђв”Ђ OpenAI (required when LLM_PROVIDER=openai) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_EMBEDDING_MODEL=${OPENAI_EMBEDDING_MODEL:-text-embedding-3-large}
      - EMBEDDING_DIMENSIONS=${EMBEDDING_DIMENSIONS:-3072}

      # в”Ђв”Ђ Ollama (required when LLM_PROVIDER=free) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://localhost:11434}

      # в”Ђв”Ђ Redis Session Store в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_DB=${REDIS_DB:-0}
      - SESSION_EXPIRY_HOURS=${SESSION_EXPIRY_HOURS:-0}

      # в”Ђв”Ђ ChromaDB в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - CHROMA_PERSIST_DIR=${CHROMA_PERSIST_DIR:-./data/vectordb}
      - CHROMA_COLLECTION_NAME=${CHROMA_COLLECTION_NAME:-vedic_astrology_books_knowledge}

      # в”Ђв”Ђ Conversation Runtime в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - CONVERSATION_CONTEXT_WINDOW=${CONVERSATION_CONTEXT_WINDOW:-20}
      - CONVERSATION_SUMMARY_THRESHOLD=${CONVERSATION_SUMMARY_THRESHOLD:-20}
      - TRANSIT_REFRESH_HOURS=${TRANSIT_REFRESH_HOURS:-24}
      - DASHA_REFRESH_DAYS=${DASHA_REFRESH_DAYS:-30}
      - ENABLE_CACHING=${ENABLE_CACHING:-true}
      - MAX_CONVERSATION_HISTORY=${MAX_CONVERSATION_HISTORY:-10}

      # в”Ђв”Ђ Response Style Validator в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - STYLE_MIN_HUMAN_WARMTH_SCORE=${STYLE_MIN_HUMAN_WARMTH_SCORE:-7}
      - STYLE_MIN_AUTHENTIC_ASTROLOGER_VOICE_SCORE=${STYLE_MIN_AUTHENTIC_ASTROLOGER_VOICE_SCORE:-7}
      - STYLE_MAX_REPETITION_RISK_SCORE=${STYLE_MAX_REPETITION_RISK_SCORE:-4}

      # в”Ђв”Ђ Validation Engine в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - ENABLE_VALIDATION_ENGINE=${ENABLE_VALIDATION_ENGINE:-true}
      - VALIDATION_RULES_PATH=${VALIDATION_RULES_PATH:-optimized/tiered_rules.json}
      - VALIDATION_INDEX_PATH=${VALIDATION_INDEX_PATH:-optimized/indexed_rules.json}
      - DEFAULT_VALIDATION_TIER=${DEFAULT_VALIDATION_TIER:-2}
      - VALIDATION_TIMEOUT_SEC=${VALIDATION_TIMEOUT_SEC:-30.0}
      - ENABLE_VALIDATION_CACHE=${ENABLE_VALIDATION_CACHE:-false}

      # в”Ђв”Ђ HuggingFace / Reranker в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - HF_OFFLINE_MODE=${HF_OFFLINE_MODE:-false}
      - HF_TIMEOUT=${HF_TIMEOUT:-10}

      # в”Ђв”Ђ Feature Flags в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - ENABLE_MULTILINGUAL=${ENABLE_MULTILINGUAL:-true}
      - ENABLE_SAFETY_CHECKS=${ENABLE_SAFETY_CHECKS:-true}
      - ENABLE_CONSTITUTION_CRITIC=${ENABLE_CONSTITUTION_CRITIC:-true}
      - ENABLE_WEB_SEARCH=${ENABLE_WEB_SEARCH:-false}
      - ENABLE_RERANKING=${ENABLE_RERANKING:-true}
      - ENABLE_CONTEXT_EXPANSION=${ENABLE_CONTEXT_EXPANSION:-true}

      # в”Ђв”Ђ Localization в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - DEFAULT_LANGUAGE=${DEFAULT_LANGUAGE:-en}
      - SUPPORTED_LANGUAGES=${SUPPORTED_LANGUAGES:-en,hi,ta,te,ml,mr,pa,hi-lat,ta-lat,te-lat,ml-lat,mr-lat,pa-lat}

      # в”Ђв”Ђ Performance в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - LLM_RATE_LIMIT_DELAY=${LLM_RATE_LIMIT_DELAY:-1.5}
      - LLM_MAX_RETRIES=${LLM_MAX_RETRIES:-3}
      - LLM_RETRY_BACKOFF=${LLM_RETRY_BACKOFF:-4.0}
      - MAX_CONCURRENT_VALIDATIONS=${MAX_CONCURRENT_VALIDATIONS:-3}
      - MAX_CONCURRENT_RAG_QUERIES=${MAX_CONCURRENT_RAG_QUERIES:-5}

    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - nakshatraai-network
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: nakshatraai-redis
    command: redis-server --appendonly yes ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nakshatraai-network

volumes:
  redis-data:

networks:
  nakshatraai-network:
    driver: bridge
