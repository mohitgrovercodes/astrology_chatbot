# docker-compose.yml
# NakshatraAI API - Docker Compose Configuration
# ================================================

version: '3.8'

services:
  api:
    build: .
    container_name: nakshatraai-api
    ports:
      - "8000:8000"
    environment:
      # API Configuration
      - DEBUG=false
      - HOST=0.0.0.0
      - PORT=8000

      # Security
      - VALID_API_KEYS=${VALID_API_KEYS}
      - INTERNAL_SERVICE_SECRET=${INTERNAL_SERVICE_SECRET}

      # Redis Session Management
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - SESSION_EXPIRY_HOURS=${SESSION_EXPIRY_HOURS:-0}

      # CORS
      - ALLOWED_ORIGINS=["*"]

      # Rate Limiting
      - RATE_LIMIT_PER_MINUTE=10

      # LLM - OpenAI (Option 2)
      - OPENAI_API_KEY=${OPENAI_API_KEY}

      # LLM Provider Configuration
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o-mini}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://localhost:11434}
      - FAST_LLM_PROVIDER=${FAST_LLM_PROVIDER:-openai}
      - FAST_LLM_MODEL=${FAST_LLM_MODEL:-gpt-4o-mini}

      # Orchestrator Settings
      - ENABLE_CACHING=${ENABLE_CACHING:-true}
      - MAX_CONVERSATION_HISTORY=${MAX_CONVERSATION_HISTORY:-10}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - nakshatraai-network
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: nakshatraai-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - nakshatraai-network

volumes:
  redis-data:


networks:
  nakshatraai-network:
    driver: bridge
