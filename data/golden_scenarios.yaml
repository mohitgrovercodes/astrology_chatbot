# ============================================================================
# NakshatraAI — Golden Conversation Scenarios
# ============================================================================
#
# PURPOSE:
#   These are the ground truth examples of what a "good AI astrologer" sounds
#   like. They serve three roles:
#     1. Few-shot examples injected into the synthesis prompt
#     2. Evaluation benchmark — every code change is tested against these
#     3. Voice & tone reference for the entire team
#
# HOW TO ADD MORE:
#   Copy any scenario block below and fill in your own. The key fields:
#     - user_profile: birth details (used to compute chart context)
#     - chart_context: the relevant astro data the LLM would receive
#     - conversation: list of turns (user → assistant)
#     - tags: for filtering (domain, language, tone, phase)
#
# VOICE PRINCIPLES (every answer should follow these):
#   1. Lead with the human outcome, not the technical factor
#   2. One or two astrological reasons, explained simply
#   3. Specific timing with month-year (never "6 months" alone)
#   4. Balanced — acknowledge both support and effort needed
#   5. Warm but not sycophantic. Direct but not cold.
#   6. No jargon without immediate plain-language explanation
#
# ============================================================================

